name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DALO_VERSION: dalo-v0.7.0

jobs:
  dalo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate public docs and review-scenario schemas
        run: python3 scripts/validate-readmes.py

      - name: Validate static website
        run: python3 scripts/validate-site.py

      - name: Run script tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install pinned DALO release
        env:
          DALO_INSTALL_DIR: ${{ runner.temp }}/bin
        run: |
          curl -fsSL https://dalo.sh/install.sh | sh
          echo "$DALO_INSTALL_DIR" >> "$GITHUB_PATH"
          installed_version="$("$DALO_INSTALL_DIR/dalo" --version | awk '{print $NF}')"
          pinned_version="${DALO_VERSION#dalo-v}"
          if [ "$installed_version" != "$pinned_version" ]; then
            echo "ERROR: installed DALO version '$installed_version' does not match pinned '$pinned_version' (from '$DALO_VERSION')" >&2
            exit 1
          fi

      - name: Validate and materialize the first-party catalog
        env:
          DALO_STORE: ${{ runner.temp }}/dalo-store
          DALO_TARGET: ${{ runner.temp }}/dalo-target
        run: |
          git switch -c ci-source
          dalo init
          dalo target link generic "$DALO_TARGET"
          expected_skill_count="$(find skills -mindepth 2 -maxdepth 2 -type f -name SKILL.md | wc -l | tr -d ' ')"
          mapfile -t first_party_skills < <(
            find skills -mindepth 2 -maxdepth 2 -type f -name SKILL.md -printf '%h\n' |
              sed 's#^skills/##' |
              sort
          )

          dalo source add-catalog sebastian "$GITHUB_WORKSPACE"
          dalo source select sebastian "${first_party_skills[@]}"
          dalo approve source sebastian
          dalo --json status > "$RUNNER_TEMP/status.json"

          jq -e --argjson expected_skill_count "$expected_skill_count" '
            (.sources[] | select(.id == "sebastian") | .skill_count) == $expected_skill_count and
            (.inventory_warnings | length) == 0 and
            (.resolution.active_skills | length) == $expected_skill_count and
            (.resolution.pending_approval_skills | length) == 0 and
            (.resolution.blocked_skills | length) == 0 and
            (.resolution.diagnostics | length) == 0 and
            ([.resolution.active_skills[].path |
              contains("/vendor/") or contains("/dist/")] | any | not)
          ' "$RUNNER_TEMP/status.json"

          dalo sync
          test "$(find "$DALO_TARGET" -mindepth 1 -maxdepth 1 -type l | wc -l | tr -d ' ')" = "$expected_skill_count"
          shopt -s nullglob
          for skill_file in skills/*/SKILL.md; do
            test -L "$DALO_TARGET/$(basename "$(dirname "$skill_file")")"
          done
          shopt -u nullglob
          test ! -e "$DALO_TARGET/github-pr-auto-review"
          test ! -e "$DALO_TARGET/german-typography"
          test ! -e "$DALO_TARGET/s7n-print-design"
          test ! -e "$DALO_TARGET/s7n-german-typography"
          test ! -e "$DALO_TARGET/s7n-linkedin-posts"
          dalo doctor
