name: Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "site/**/*.html"
      - ".lycheeignore"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check Markdown and site links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --include-fragments
            --max-concurrency 32
            --host-concurrency 2
            --timeout 30
            './**/*.md'
            './site/**/*.html'
          fail: true
