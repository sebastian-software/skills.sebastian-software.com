# Managed by Alfred/OpenClaw for sebastian-software.
# Renovate owns version-update PRs, including GitHub Actions. This centrally
# managed entry remains present, but its PR creation is intentionally disabled.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
